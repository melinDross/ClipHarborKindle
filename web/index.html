<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindle → Notion Exporter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav">
    <span>📚 Kindle → Notion Exporter</span>
    <div class="header-actions">
      <!-- TODO: replace TU_USUARIO_AQUI with the real Ko-fi username once the account exists -->
      <a id="kofi-link" class="kofi-link" href="https://ko-fi.com/TU_USUARIO_AQUI" target="_blank" rel="noopener noreferrer">
        <img src="vendor/kofi-badge.svg" alt="Buy Me a Coffee at ko-fi.com" class="kofi-badge">
      </a>
      <div class="lang-switch">
        <button id="lang-es" class="lang-button" type="button">🇪🇸 ES</button>
        <button id="lang-en" class="lang-button" type="button">🇬🇧 EN</button>
      </div>
    </div>
  </header>

  <main>
    <div id="drop-zone" class="drop-zone" role="button" tabindex="0">
      ⬆️ Arrastra aquí tu "My Clippings.txt"<br>o haz clic para seleccionar
    </div>
    <input type="file" id="file-input" accept=".txt" hidden>

    <p id="error-message" class="error" aria-live="polite" hidden></p>

    <section id="results" hidden>
      <h2 id="book-count" aria-live="polite"></h2>
      <ul id="book-list"></ul>
      <button id="download-button">⬇️ Descargar todo (.zip)</button>
    </section>
  </main>

  <script src="vendor/jszip.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
