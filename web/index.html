<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kindle → Notion Exporter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav">
    <span>📚 Kindle → Notion Exporter</span>
    <div class="lang-switch">
      <button id="lang-es" class="lang-button" type="button">🇪🇸 ES</button>
      <button id="lang-en" class="lang-button" type="button">🇬🇧 EN</button>
    </div>
  </header>

  <main>
    <div id="drop-zone" class="drop-zone">
      ⬆️ Arrastra aquí tu "My Clippings.txt"<br>o haz clic para seleccionar
    </div>
    <input type="file" id="file-input" accept=".txt" hidden>

    <p id="error-message" class="error" hidden></p>

    <section id="results" hidden>
      <h2 id="book-count"></h2>
      <ul id="book-list"></ul>
      <button id="download-button">⬇️ Descargar todo (.zip)</button>
    </section>
  </main>

  <script src="vendor/jszip.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
